<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Specifies the character encoding for the HTML document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Controls the viewport of the webpage -->
    <link rel="stylesheet" href="static/styles/index.css"> <!-- Link to the CSS file for styling the homepage --> 
    <title>Home</title>

</head>
<body>
    <h1 class="page_titles">NAME CHECKER!</h1> <!-- Title of page -->


    <!-- Image / Result container -->
    <div class="display_area" id="display_area">
        <div class="homepage_image" id="homepage_image"></div>  <!-- Main image on the homepage -->
    </div>



    <p class="paragraph_style">Welcome to the name checker, enter a name to glamourise it!</p> <!-- Paragraph describing the website -->
        

    <!-- Name input box -->
    <div class="input_section">
        <input type="text" class="name_input_box" placeholder="Enter a name..." id="user_name">
    

        <!-- Button to enter name -->
        <button class="homepage_enter_button" id="enter_button">ENTER</button>

        
        <!-- New reset button -->
        <button class="reset_button" id="reset_button">RESET</button>


    </div>
</body>

<script src="static/styles/index.js"></script> <!-- Link to the JavaScript file for the homepage -->

</html>
